name: Refresh leaderboard data

# Rafraîchit le classement Cryptonauts (data.json) et le commit si les
# rangs des holders ont réellement changé. L'index (index.html) charge ce
# data.json en direct via fetch — plus aucune donnée n'est cuite dans l'index.
#
# IMPORTANT : tourne sur un RUNNER SELF-HOSTED installé sur le PC de l'auteur.
# crypto.com renvoie des 429 (Too Many Requests) aux IP de datacenter de
# GitHub : l'agrégation ne fonctionne que depuis une IP résidentielle.

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 06:00 UTC (s'exécute quand le runner est en ligne)
  workflow_dispatch: {}    # bouton « Run workflow » manuel

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: self-hosted   # PC de l'auteur (IP résidentielle, non bloquée par crypto.com)
    timeout-minutes: 45
    # Pas de shell bash imposé : le runner Windows n'a pas forcément bash dans son
    # PATH. Les étapes n'invoquent que node/npm (portable) ou un script Node.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      # Owners.json (cache des handles Twitter/X) est gitignoré : on le persiste
      # via le cache des Actions pour éviter de re-scraper X à chaque exécution.
      - name: Restore Twitter handle cache
        uses: actions/cache@v4
        with:
          path: Owners.json
          key: owners-json-${{ github.run_id }}
          restore-keys: |
            owners-json-

      - name: Build data.json
        run: node Test.js

      - name: Commit data.json si le classement a changé
        run: node .github/commit-data.js
